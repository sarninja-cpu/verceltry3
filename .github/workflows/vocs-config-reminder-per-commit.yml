name: Vocs Config Reminder (Per Commit)

on:
  pull_request:
    types: [synchronize]
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  check-new-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Check new commits for added or renamed files
        uses: actions/github-script@v7.1.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const before = context.payload.before;
            const after = context.payload.after;

            // Compare the commits pushed in this sync event
            const { data: comparison } = await github.rest.repos.compareCommits({
              owner,
              repo,
              base: before,
              head: after
            });

            // Check if any documentation files were added or renamed in this push
            const docFiles = comparison.files.filter(file =>
              (file.status === 'added' || file.status === 'renamed') &&
              (file.filename.startsWith('docs/') || file.filename.endsWith('.mdx') || file.filename.endsWith('.md'))
            );

            if (docFiles.length === 0) {
              console.log('No new documentation files were added or renamed in this push. Skipping reminder.');
              return;
            }

            console.log(`Found ${docFiles.length} newly added/renamed documentation file(s):`);
            docFiles.forEach(f => console.log(`  - ${f.filename} (${f.status})`));

            const fileList = docFiles.map(f => `- \`${f.filename}\` (${f.status})`).join('\n');

            const body = `### Sidebar Configuration Reminder PER COMMIT

            New documentation files were added or renamed in the latest push:

            ${fileList}

            Please ensure that:
            - [ ] The sidebar in [\`vocs.config.ts\`](../blob/develop/vocs.config.ts) has been updated to include these files
            - [ ] New content has the \`dev: true\` parameter so it appears on the dev site first
            - [ ] Links in the sidebar match the file paths

            See the [contributing guide](https://frameworks.securityalliance.dev/contribute/contributing) for more details.

            ---
            <sub>This is an automated reminder. If this PR doesn't need sidebar changes, you can ignore this message.</sub>`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body
            });

            console.log('Posted reminder comment.');
