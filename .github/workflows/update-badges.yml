name: 🏅 Update Contributor Badges

on:
  schedule:
    # Run daily at 2 AM UTC (adjust timezone as needed)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual triggering
  push:
    branches:
      - main
    paths:
      - 'docs/pages/config/contributors.json'
      - '.github/workflows/update-badges.yml'
      - '.github/scripts/update-badges.js'

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  update-badges:
    name: Calculate and Update Badges
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # Full history needed for early contributor detection

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update contributor badges
        id: update-badges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/update-badges.js

      - name: Check for changes
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain docs/pages/config/contributors.json)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected in contributors.json"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No changes to contributors.json"
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/pages/config/contributors.json
          git commit -m "🏅 Auto-update contributor badges [skip ci]"
          git push

      - name: Create summary
        if: always()
        run: |
          echo "## 🏅 Badge Update Summary" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Badges have been updated and committed." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No badge changes were needed." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow run:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

