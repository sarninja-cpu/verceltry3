<!DOCTYPE html>
<html lang="en" data-vocs>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <script src="/initializeTheme.iife.js"></script>
  <style>
    /* CSS Variables - Light Mode */
    :root {
      --vocs-color_background: rgba(255 255 255 / 100%);
      --vocs-color_text: #4c4c4c;
      --vocs-color_heading: #202020;
      --vocs-color_border: #ececec;
      --vocs-color_textAccent: #0588f0;
      --vocs-color_textAccentHover: #0d74ce;
      --vocs-space_8: .5rem;
      --vocs-space_24: 1.5rem;
      --vocs-space_64: 4rem;
      --vocs-fontSize_root: 16px;
      --vocs-fontSize_h1: 2rem;
      --vocs-fontFamily_default: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      --vocs-fontWeight_regular: 300;
      --vocs-fontWeight_medium: 400;
      --vocs-lineHeight_paragraph: 1.75em;
      --vocs-lineHeight_heading: 1.5em;
    }

    /* CSS Variables - Dark Mode */
    :root.dark {
      --vocs-color_background: #121113;
      --vocs-color_text: rgba(255, 255, 255, .8);
      --vocs-color_heading: rgba(255 255 255 / 100%);
      --vocs-color_border: #2b292d;
      --vocs-color_textAccent: #3b9eff;
      --vocs-color_textAccentHover: #0090ff;
    }

    /* Base Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      border-width: 0;
      border-style: solid;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--vocs-fontFamily_default);
      font-size: var(--vocs-fontSize_root);
      line-height: var(--vocs-lineHeight_paragraph);
      font-weight: var(--vocs-fontWeight_regular);
      background-color: var(--vocs-color_background);
      color: var(--vocs-color_text);
      -webkit-text-size-adjust: 100%;
      text-rendering: optimizeLegibility;
    }

    hr {
      height: 0;
      color: inherit;
      border-top-width: 1px;
      border-top-style: solid;
      border-top-color: var(--vocs-color_border);
    }

    h1, h2, h3, h4, h5, h6 {
      font-size: inherit;
      font-weight: inherit;
      margin: 0;
    }

    a {
      color: inherit;
      text-decoration: inherit;
    }

    p {
      margin: 0;
    }

    /* H1 Styles */
    .vocs_H1 {
      font-size: var(--vocs-fontSize_h1);
      letter-spacing: -.02em;
      line-height: var(--vocs-lineHeight_heading);
      color: var(--vocs-color_heading);
      font-weight: var(--vocs-fontWeight_regular);
    }

    /* Paragraph Styles */
    .vocs_Paragraph {
      line-height: var(--vocs-lineHeight_paragraph);
      letter-spacing: .005em;
      color: var(--vocs-color_text);
      margin-bottom: var(--vocs-space_24);
    }

    /* Link Styles */
    .vocs_Link {
      color: var(--vocs-color_textAccent);
      font-weight: var(--vocs-fontWeight_medium);
      text-underline-offset: var(--vocs-space_8);
      text-decoration: underline;
      transition: color .1s;
    }

    .vocs_Link:hover {
      color: var(--vocs-color_textAccentHover);
    }

    /* NotFound Component Styles */
    .vocs_NotFound_root {
      align-items: center;
      display: flex;
      flex-direction: column;
      max-width: 400px;
      margin: 0 auto;
      padding-top: var(--vocs-space_64);
    }

    .vocs_NotFound_divider {
      border-color: var(--vocs-color_border);
      width: 50%;
    }
  </style>
</head>
<body>
  <div class="vocs_NotFound_root">
    <h1 class="vocs_H1">Page Not Found</h1>
    <div style="height: var(--vocs-space_24);"></div>
    <hr class="vocs_NotFound_divider" />
    <div style="height: var(--vocs-space_24);"></div>
    <p class="vocs_Paragraph">The page you were looking for could not be found.</p>
    <div style="height: var(--vocs-space_8);"></div>
    <a href="/" class="vocs_Link">Go to Home Page</a>
  </div>
</body>
</html>
